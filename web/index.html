<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>접속 테스트</title>
    <style>
      :root {
        --bg: #0d1b1e;
        --fg: #f6f3ee;
        --accent: #f4a259;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: radial-gradient(1200px 600px at 20% 20%, #1b2a2f, #0d1b1e);
        color: var(--fg);
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        max-width: 720px;
        text-align: center;
        border: 1px solid #2b3a3f;
        padding: 32px 28px;
        border-radius: 16px;
        background: rgba(13, 27, 30, 0.6);
        backdrop-filter: blur(6px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 8px 0;
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #12262b;
        color: var(--accent);
        font-weight: 600;
        margin-top: 12px;
      }
      .meta {
        margin-top: 16px;
        font-size: 14px;
        color: #c3c9c6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>사내 접속 테스트 페이지</h1>
      <p>이 페이지가 보이면 우분투 서버의 웹 접근이 정상입니다.</p>
      <span class="badge">OK</span>
      <p class="meta">경로: /web/index.html</p>
    </main>
  </body>
</html>
